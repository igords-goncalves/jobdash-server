networks:
  bun-api-network:

services:
  api:
    build: .
    ports:
      - "3333:3333"
    depends_on:
      - db
    env_file:
      - ./.env
    volumes:
      - .:/usr/src/app
    command: bun start
    restart: always
    networks:
      - bun-api-network

  db:
    image: postgres:16
    restart: always
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bun-api-network

volumes:
  pgdata:
