version: "3.9"

services:
  api:
    build: .
    ports:
      - "3333:3333"
    depends_on:
      - db
    env_file:
      - ./.env
    volumes:
      - .:/app
    command: bun start
    restart: unless-stopped

  db:
    image: postgres:16
    restart: always
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
